<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Si-Dul Sistem Aplikasi Pengaduan Layanan</title>
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 { text-align: center; color: #333; }

        .form-group { margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; font-weight: bold; }

        input[type="text"], input[type="date"], textarea, input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        textarea { height: 100px; resize: vertical; }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover { background-color: #2980b9; }

        #preview-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .img-preview {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Pengaduan</h2>
    <form id="complaintForm">
        <div class="form-group">
            <label>Nama Pengadu</label>
            <input type="text" id="nama" placeholder="Masukkan nama Anda" required>
        </div>

        <div class="form-group">
            <label>Tanggal</label>
            <input type="date" id="tanggal" required>
        </div>

        <div class="form-group">
            <label>Perihal Pengaduan</label>
            <textarea id="perihal" placeholder="Jelaskan detail pengaduan..." required></textarea>
        </div>

        <div class="form-group">
            <label>Bukti Foto</label>
            <input type="file" id="foto" accept="image/*" required>
        </div>

        <button type="submit">Kirim Pengaduan</button>
    </form>

    <div id="preview-container" style="display: none;">
        <h3>Hasil Input Terakhir:</h3>
        <div id="result" class="card"></div>
    </div>
</div>

<script>
    const form = document.getElementById('complaintForm');
    const previewContainer = document.getElementById('preview-container');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        // Mengambil nilai input
        const nama = document.getElementById('nama').value;
        const tanggal = document.getElementById('tanggal').value;
        const perihal = document.getElementById('perihal').value;
        const fotoInput = document.getElementById('foto');
        
        // Memproses File Foto
        const file = fotoInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const imageUrl = e.target.result;

            // Menampilkan hasil di bawah form
            resultDiv.innerHTML = `
                <p><strong>Nama:</strong> ${nama}</p>
                <p><strong>Tanggal:</strong> ${tanggal}</p>
                <p><strong>Perihal:</strong> ${perihal}</p>
                <p><strong>Bukti Foto:</strong></p>
                <img src="${imageUrl}" class="img-preview" alt="Bukti Foto">
            `;
            
            previewContainer.style.display = 'block';
            alert('Pengaduan berhasil diterima (Simulasi)');
            form.reset();
        };

        if (file) {
            reader.readAsDataURL(file);
        }
    });
</script>

</body>
</html>
