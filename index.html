<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiDul - Sistem Informasi Pengaduan Layanan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #003366; } /* Warna Navy khas Layanan Publik */
        .navbar { background-color: var(--primary-color); }
        .btn-primary { background-color: var(--primary-color); border: none; }
        .btn-primary:hover { background-color: #002244; }
        .hero-section { background: #f8f9fa; padding: 40px 0; border-bottom: 2px solid #dee2e6; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                🏢 SiDul
            </a>
            <span class="navbar-text d-none d-md-block text-white">
                Sistem Informasi Pengaduan Layanan
            </span>
        </div>
    </nav>

    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-5 fw-bold">Sampaikan Keluhan Anda</h1>
            <p class="lead">Layanan pengaduan masyarakat yang cepat, transparan, dan akuntabel.</p>
        </div>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <form id="formSiDul">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Nama Pelapor</label>
                                    <input type="text" id="nama" class="form-control" placeholder="Nama lengkap" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Kontak (WA/Email)</label>
                                    <input type="text" id="kontak" class="form-control" placeholder="0812..." required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Kategori Layanan</label>
                                <select id="kategori" class="form-select">
                                    <option value="Kebersihan">Kebersihan Lingkungan</option>
                                    <option value="Infrastruktur">Infrastruktur & Jalan</option>
                                    <option value="Kesehatan">Layanan Kesehatan</option>
                                    <option value="Administrasi">Administrasi Kependudukan</option>
                                    <option value="Lainnya">Lainnya</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Isi Aduan</label>
                                <textarea id="isi" class="form-control" rows="5" placeholder="Ceritakan detail persoalan..." required></textarea>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" id="btnSubmit" class="btn btn-primary btn-lg">Kirim Aduan Sekarang</button>
                            </div>
                        </form>
                        <div id="statusMessage" class="mt-4 text-center d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 text-muted">
        <small>&copy; 2024 SiDul - Pemerintah Kota/Kabupaten. Seluruh data dilindungi.</small>
    </footer>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyXrRBjHBHjOV5t9bmJHL4wBTP5bd0utBw4itwUVSNxTFZS7PkSP-dDXEBQ5RXKAMNxyw/exec';
        const form = document.getElementById('formSiDul');
        const btnSubmit = document.getElementById('btnSubmit');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btnSubmit.disabled = true;
            const msg = document.getElementById('statusMessage');
            msg.className = "mt-4 text-center alert alert-info";
            msg.textContent = "Sistem sedang mencatat pengaduan Anda...";
            msg.classList.remove('d-none');

            const payload = {
                nama: document.getElementById('nama').value,
                kontak: document.getElementById('kontak').value,
                kategori: document.getElementById('kategori').value,
                isi: document.getElementById('isi').value
            };

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(response => {
                if(response.status === 'success') {
                    msg.className = "mt-4 text-center alert alert-success";
                    msg.innerHTML = `<h5>Laporan Berhasil Diterima!</h5>ID Laporan: <strong>${response.id}</strong><br>Mohon simpan ID ini untuk melacak status aduan.`;
                    form.reset();
                }
                btnSubmit.disabled = false;
            })
            .catch(error => {
                msg.className = "mt-4 text-center alert alert-danger";
                msg.textContent = "Maaf, terjadi kendala teknis. Mohon coba lagi.";
                btnSubmit.disabled = false;
            });
        });
    </script>
</body>
</html>
